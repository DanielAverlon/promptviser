syntax = "proto3";
package pb;

option go_package = "github.com/effective-security/promptviser/api/pb";
import "google/api/annotations.proto";
import "es/api/annotations.proto";
// import "google/protobuf/empty.proto";

service Adviser {
  // Submit data for analysis.
  rpc Submit(SubmitRequest) returns (SubmitResponse) {
    option (google.api.http) = {
      post : "/pb.Adviser/Submit",
      body : "*"
    };
    option (es.api.cli_cmd) = "submit";
  };

  // MatchRules evaluates anonymized dimension scores and static triggers against
  // the rules database and returns matching findings. Prompt text never leaves
  // the client — only numeric scores and metadata flags are sent.
  rpc MatchRules(MatchRulesRequest) returns (MatchRulesResponse) {
    option (google.api.http) = {
      post : "/pb.Adviser/MatchRules",
      body : "*"
    };
    option (es.api.cli_cmd) = "match-rules";
  };

  // GetRules returns all rules so the client can cache them locally for
  // offline Pass 1 evaluation.
  rpc GetRules(GetRulesRequest) returns (GetRulesResponse) {
    option (google.api.http) = {
      post : "/pb.Adviser/GetRules",
      body : "*"
    };
    option (es.api.cli_cmd) = "get-rules";
  };
}

message SubmitRequest { string Data = 1 [ json_name = "Data" ]; }

message SubmitResponse {
  // ID is the job ID.
  string ID = 1 [ json_name = "ID" ];
}

// DimensionScore represents a single LLM-scored quality or risk dimension.
// Values are normalised floats in [0, 1].
message DimensionScore {
  // Dimension is the name of the scoring dimension, e.g. "pii_exposure".
  string Dimension = 1 [ json_name = "Dimension" ];
  // Score is the normalised value in [0, 1].
  float Score = 2 [ json_name = "Score" ];
}

// MatchRulesRequest carries anonymised signals from the local scanner.
// No prompt text is included — only derived scores and metadata.
message MatchRulesRequest {
  // Scores contains LLM-derived dimension scores (Pass 3 output).
  repeated DimensionScore Scores = 1 [ json_name = "Scores" ];
  // MetadataFlags carries boolean YAML metadata, e.g. "is_user_facing",
  // "domain:medical".
  repeated string MetadataFlags = 2 [ json_name = "MetadataFlags" ];
  // StaticTriggers lists rule IDs or named patterns that fired locally during
  // Pass 1 / Pass 2 (regex + AST), e.g. "MISSING_DELIMITER",
  // "HARDCODED_SECRET".
  repeated string StaticTriggers = 3 [ json_name = "StaticTriggers" ];
}

// Finding is a single matched rule with remediation guidance.
message Finding {
  // RuleID is the stable identifier, e.g. "PRIV-001".
  string RuleID = 1 [ json_name = "RuleID" ];
  // Title is the human-readable name.
  string Title = 2 [ json_name = "Title" ];
  // Severity is one of: Critical, High, Medium, Low.
  string Severity = 3 [ json_name = "Severity" ];
  // Domain is the rule category, e.g. "Data Privacy & Confidentiality".
  string Domain = 4 [ json_name = "Domain" ];
  // Remediation is the suggested fix text.
  string Remediation = 5 [ json_name = "Remediation" ];
  // Standards lists applicable compliance references, e.g. "OWASP LLM01".
  repeated string Standards = 6 [ json_name = "Standards" ];
  // TriggerType is one of: static, score, meta, or combined.
  string TriggerType = 7 [ json_name = "TriggerType" ];
}

// MatchRulesResponse contains all rules that fired for the given input.
message MatchRulesResponse {
  repeated Finding Findings = 1 [ json_name = "Findings" ];
}

// GetRulesRequest allows optional domain or severity filtering.
message GetRulesRequest {
  // Domain filters by rule domain; empty means all domains.
  string Domain = 1 [ json_name = "Domain" ];
  // Severity filters by minimum severity; empty means all severities.
  string Severity = 2 [ json_name = "Severity" ];
}

// GetRulesResponse returns the full rule catalogue.
message GetRulesResponse {
  repeated Finding Rules = 1 [ json_name = "Rules" ];
}