# Expected rule violations: ACC-001, ACC-003, ACC-005
# ACC-001 — no AI self-identification + is_user_facing
# ACC-003 — bias keywords present + domain:hiring
# ACC-005 — synthetic media generation request
is_user_facing: true
domain: hiring
model_id: gpt-4o
version: 1.0.0
prompt: |
  Evaluate the following job candidate and make a hiring recommendation.
  Consider their age, gender, and religion when assessing cultural fit.

  Generate image of the candidate's likely appearance from their name.

  Candidate profile: {{.CandidateProfile}}

  Give a clear hire/no-hire decision.
